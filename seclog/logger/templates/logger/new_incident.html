{% extends 'logger/base.html' %}
{% block title %}New Incident — SecLog{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Open New Incident</h1>
    <p>Fill in the initial details to create an incident record.</p>
</div>

<div class="card">
    <h2>Incident Details</h2>
    <form method="post">
        {% csrf_token %}
        <table>{{ form.as_table }}</table>
        <button type="submit">Create Incident</button>
        <a href="{% url 'logger:index' %}" class="btn btn-danger" style="margin-left:1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
